name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Ruff
        run: uvx ruff check services/

  unit-tests:
    name: Unit tests / ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: event-ingestion
          - service: feature-pipeline
          - service: inference-api
          - service: privacy
          - service: model-training
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: uv sync --frozen --no-dev
      - name: Run unit tests
        working-directory: services/${{ matrix.service }}
        env:
          PSEUDONYMIZE_SECRET: ci-test-secret
        run: uv run pytest tests/ --ignore=tests/test_integration.py -v

  build:
    name: Docker build / ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    strategy:
      fail-fast: false
      matrix:
        service: [event-ingestion, inference-api, privacy, feature-pipeline]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
