apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: ai-personalization-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      serviceAccountName: mlflow
      nodeSelector:
        cloud.google.com/gke-nodepool: apps-spot
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v2.13.0
          command:
            - mlflow
            - server
            - --backend-store-uri
            - $(MLFLOW_BACKEND_STORE_URI)
            - --default-artifact-root
            - $(MLFLOW_ARTIFACT_ROOT)
            - --host
            - "0.0.0.0"
            - --port
            - "5001"
          ports:
            - containerPort: 5001
          env:
            - name: MLFLOW_BACKEND_STORE_URI
              valueFrom:
                secretKeyRef:
                  name: mlflow-db-secret
                  key: MLFLOW_BACKEND_STORE_URI
            - name: MLFLOW_ARTIFACT_ROOT
              valueFrom:
                secretKeyRef:
                  name: mlflow-db-secret
                  key: MLFLOW_ARTIFACT_ROOT
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 10
