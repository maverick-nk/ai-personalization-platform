---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: event-ingestion
  namespace: ai-personalization-platform
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: inference-api
  namespace: ai-personalization-platform
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: privacy
  namespace: ai-personalization-platform
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: feature-pipeline
  namespace: ai-personalization-platform
  annotations:
