    iam.gke.io/gcp-service-account: feature-pipeline-sa@REPLACE_WITH_PROJECT_ID.iam.gserviceaccount.com
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: model-training
  namespace: ai-personalization-platform
  annotations:
    iam.gke.io/gcp-service-account: model-training-sa@REPLACE_WITH_PROJECT_ID.iam.gserviceaccount.com
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mlflow
  namespace: ai-personalization-platform
  annotations:
    iam.gke.io/gcp-service-account: mlflow-sa@REPLACE_WITH_PROJECT_ID.iam.gserviceaccount.com
