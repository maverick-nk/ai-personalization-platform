sonar.projectKey=maverick-nk_ai-personalization-platform
sonar.organization=maverick-nk
sonar.projectName=AI Personalization Platform

sonar.sources=services

# Exclude generated/vendor code within services/
# Everything outside services/ (infra/, scripts/, tests/, docs/, .claude/, .github/) is not included
sonar.exclusions=\
  **/*.pb.go,\
  **/*_grpc.pb.go,\
  **/vendor/**,\
  **/__pycache__/**,\
  **/*.egg-info/**

sonar.python.version=3.11
sonar.scm.provider=git

# Uncomment when coverage reports are available:
# sonar.python.coverage.reportPaths=coverage.xml
# sonar.go.golangci-lint.reportPaths=golangci-report.xml
